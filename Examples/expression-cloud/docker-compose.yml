services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    restart: always
    ports:
      - "17880:17880"
      - "17881:17881"
      - "50700-50720:50700-50720/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    networks:
      - bh-network
    depends_on:
      redis:
        condition: service_started

  agent:
    build:
      context: .
      dockerfile: agent.dockerfile
    entrypoint: ["python", "agent.py", "start"]
    restart: always
    environment:
      - LIVEKIT_URL=ws://livekit:17880
      # Dev-only credentials (matches livekit.yaml). Replace for production.
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=UPivas8PQvWiYhubkqxqfkY8kfB9TgGj
    env_file:
      - path: ./.env
        required: false
    volumes:
      - ./agent.py:/app/agent.py
      - ./avatars:/app/avatars   # Mount avatar images (optional, for local files)
    networks:
      - bh-network
    depends_on:
      livekit:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: webui.dockerfile
    restart: always
    ports:
      - "4202:4202"
    environment:
      # Dev-only credentials (matches livekit.yaml). Replace for production.
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=UPivas8PQvWiYhubkqxqfkY8kfB9TgGj
      - LIVEKIT_API_URL=http://livekit:17880
      - PORT=4202
    networks:
      - bh-network
    depends_on:
      livekit:
        condition: service_started

  redis:
    image: redis:alpine
    restart: always
    networks:
      - bh-network

networks:
  bh-network:
    driver: bridge
